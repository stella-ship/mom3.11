<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>给妈妈的一封回忆信</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
      background:
        radial-gradient(circle at top left, #fff4f7 0%, transparent 35%),
        radial-gradient(circle at top right, #f4f9ff 0%, transparent 35%),
        linear-gradient(135deg,#fff0f4,#f8fbff 55%,#fff7ef);
      overflow-x:hidden;
      color:#2b2b2b;
    }

    .hearts{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:1;
    }
    .heart{
      position:absolute;
      bottom:-40px;
      font-size:18px;
      opacity:.75;
      animation:floatUp linear forwards;
      filter:drop-shadow(0 4px 8px rgba(255,90,120,.15));
    }
    @keyframes floatUp{
      0%{transform:translateY(0) translateX(0) scale(.8);opacity:0}
      10%{opacity:.75}
      100%{transform:translateY(-115vh) translateX(25px) scale(1.2);opacity:0}
    }

    .music-btn{
      position:fixed;
      top:14px;
      right:14px;
      z-index:999;
      border:none;
      border-radius:14px;
      padding:10px 14px;
      background:linear-gradient(135deg,#ff7a95,#ff5d82);
      color:#fff;
      font-size:14px;
      box-shadow:0 10px 24px rgba(255,93,130,.28);
      cursor:pointer;
    }

    .screen{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px 14px 30px;
      position:relative;
      z-index:2;
    }

    .envelope-wrap{
      width:min(420px,92vw);
      text-align:center;
      transition:opacity .7s ease, transform .7s ease;
      margin:0 auto;
    }
    .envelope-wrap.hide{
      opacity:0;
      transform:translateY(-16px) scale(.98);
      pointer-events:none;
      position:absolute;
    }

    .hint{
      margin-top:18px;
      color:#7c6f76;
      font-size:15px;
      letter-spacing:.3px;
    }

    .envelope{
      width:100%;
      aspect-ratio:1.18/0.82;
      position:relative;
      cursor:pointer;
      margin:0 auto;
      filter:drop-shadow(0 20px 40px rgba(0,0,0,.12));
    }

    .env-back{
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,#fff,#fff8fa);
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(0,0,0,.05);
    }

    .env-front{
      position:absolute;
      left:0; right:0; bottom:0;
      height:62%;
      background:linear-gradient(135deg,#ffd8e1,#ffc9d6);
      clip-path:polygon(0 0,50% 58%,100% 0,100% 100%,0 100%);
      border-bottom-left-radius:18px;
      border-bottom-right-radius:18px;
      z-index:3;
    }

    .env-top{
      position:absolute;
      left:0; right:0; top:0;
      height:62%;
      background:linear-gradient(135deg,#ffe4eb,#ffd4df);
      clip-path:polygon(0 0,100% 0,50% 100%);
      transform-origin:top center;
      transition:transform .9s ease;
      z-index:4;
    }
    .envelope.open .env-top{
      transform:rotateX(180deg);
    }

    .letter-preview{
      position:absolute;
      left:7%;
      width:86%;
      top:11%;
      height:72%;
      background:linear-gradient(180deg,#fff,#fff9fb);
      border-radius:14px;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#d95b78;
      font-weight:700;
      font-size:22px;
      transform:translateY(20px);
      transition:transform .9s ease;
      box-shadow:0 8px 20px rgba(0,0,0,.05) inset;
      text-align:center;
      padding:0 10px;
    }
    .envelope.open .letter-preview{
      transform:translateY(-46px);
    }

    .seal{
      position:absolute;
      left:50%;
      top:49%;
      transform:translate(-50%,-50%);
      z-index:5;
      width:62px;
      height:62px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #ff96aa, #ff6283);
      box-shadow:0 8px 20px rgba(255,98,131,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:24px;
      transition:opacity .3s ease;
    }
    .envelope.open .seal{
      opacity:0;
    }

    .card-wrap{
      width:100%;
      max-width:680px;
      margin:0 auto;
      opacity:0;
      transform:translateY(30px) scale(.98);
      pointer-events:none;
      transition:opacity .85s ease, transform .85s ease;
    }
    .card-wrap.show{
      opacity:1;
      transform:translateY(0) scale(1);
      pointer-events:auto;
    }

    .card{
      width:100%;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:24px;
      padding:22px 18px 20px;
      box-shadow:0 16px 40px rgba(0,0,0,.10);
      position:relative;
      overflow:hidden;
    }

    .card:before{
      content:"";
      position:absolute;
      inset:-80px auto auto -80px;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(255,174,194,.18);
      filter:blur(10px);
    }
    .card:after{
      content:"";
      position:absolute;
      right:-60px;
      bottom:-60px;
      width:160px;
      height:160px;
      border-radius:50%;
      background:rgba(180,214,255,.16);
      filter:blur(10px);
    }

    .title{
      margin:0 0 14px;
      font-size:28px;
      line-height:1.2;
      position:relative;
      z-index:1;
    }

    .msg{
      font-size:17px;
      line-height:1.95;
      white-space:pre-wrap;
      min-height:190px;
      position:relative;
      z-index:1;
    }

    .cursor{
      display:inline-block;
      width:10px;
      animation:blink 1s infinite;
      color:#ff6f90;
      font-weight:700;
    }
    @keyframes blink{
      0%,50%{opacity:1}
      50.01%,100%{opacity:0}
    }

    .gallery{
      position:relative;
      margin:20px 0 10px;
      height:360px;
      border-radius:18px;
      overflow:hidden;
      z-index:1;
      background:rgba(255,255,255,.45);
      box-shadow:0 14px 30px rgba(0,0,0,.12);
      opacity:0;
      transform:translateY(16px);
      transition:opacity 1.2s ease, transform 1.2s ease;
    }
    .gallery.show{
      opacity:1;
      transform:translateY(0);
    }

    .slide{
      position:absolute;
      inset:0;
      opacity:0;
      transform:scale(1.04);
      transition:opacity 1.4s ease, transform 1.8s ease;
    }
    .slide.active{
      opacity:1;
      transform:scale(1);
      z-index:2;
    }
    .slide img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .caption{
      position:absolute;
      left:12px;
      right:12px;
      bottom:12px;
      z-index:3;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(0,0,0,.28);
      color:#fff;
      font-size:14px;
      line-height:1.6;
      opacity:0;
      transform:translateY(10px);
      transition:all .8s ease;
      backdrop-filter:blur(6px);
    }
    .caption.show{
      opacity:1;
      transform:translateY(0);
    }

    .from{
      margin-top:14px;
      text-align:right;
      font-size:17px;
      font-weight:700;
      color:#4a3f44;
      position:relative;
      z-index:1;
    }

    .endline{
      margin-top:12px;
      text-align:center;
      font-size:22px;
      line-height:1.5;
      color:#d85d7b;
      font-weight:800;
      letter-spacing:.3px;
      opacity:0;
      transform:translateY(12px) scale(.96);
      transition:all .9s ease;
    }
    .endline.show{
      opacity:1;
      transform:translateY(0) scale(1);
    }

    @media (max-width:640px){
      .screen{
        padding:16px 10px 24px;
      }

      .envelope-wrap{
        width:88vw;
      }

      .card-wrap{
        width:100%;
        max-width:100%;
      }

      .card{
        width:100%;
        border-radius:20px;
        padding:18px 14px 18px;
      }

      .title{
        font-size:22px;
      }

      .msg{
        font-size:16px;
        line-height:1.9;
        min-height:160px;
      }

      .gallery{
        height:260px;
        margin:18px 0 8px;
        border-radius:16px;
      }

      .caption{
        left:10px;
        right:10px;
        bottom:10px;
        font-size:13px;
        padding:10px 12px;
        border-radius:12px;
      }

      .from{
        font-size:16px;
      }

      .endline{
        font-size:20px;
      }

      .music-btn{
        top:12px;
        right:12px;
        padding:9px 12px;
        font-size:14px;
      }
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <button class="music-btn" id="musicBtn">🎵 点我播放</button>

  <div class="screen">
    <div class="envelope-wrap" id="envelopeWrap">
      <div class="envelope" id="envelope">
        <div class="env-back"></div>
        <div class="letter-preview">给妈妈的一封回忆信</div>
        <div class="env-top"></div>
        <div class="env-front"></div>
        <div class="seal">💌</div>
      </div>
      <div class="hint">点一下，打开这封回忆信</div>
    </div>

    <div class="card-wrap" id="cardWrap">
      <div class="card">
        <h1 class="title">给妈妈的一封信</h1>

        <div id="msg" class="msg"></div>

        <div class="gallery" id="gallery">
          <div class="slide active"><img src="1.jpg" alt="照片1"></div>
          <div class="slide"><img src="2.jpg" alt="照片2"></div>
          <div class="slide"><img src="3.jpg" alt="照片3"></div>
          <div class="slide"><img src="4.jpg" alt="照片4"></div>
          <div class="slide"><img src="5.jpg" alt="照片5"></div>
            <div class="slide"><img src="6.jpg" alt="照片5"></div>
          <div class="caption" id="caption"></div>
        </div>

        <div class="from">—— 永远爱你的我 ❤️</div>
        <div class="endline" id="endline">妈妈，谢谢你一直爱我。</div>
      </div>
    </div>
  </div>

  <audio id="music" preload="auto" loop playsinline webkit-playsinline>
    <source src="mom.mp3" type="audio/mpeg">
  </audio>

  <script>
    const envelope = document.getElementById("envelope");
    const envelopeWrap = document.getElementById("envelopeWrap");
    const cardWrap = document.getElementById("cardWrap");
    const msg = document.getElementById("msg");
    const music = document.getElementById("music");
    const musicBtn = document.getElementById("musicBtn");
    const hearts = document.getElementById("hearts");
    const gallery = document.getElementById("gallery");
    const slides = document.querySelectorAll(".slide");
    const caption = document.getElementById("caption");
    const endline = document.getElementById("endline");

    const text = `妈妈，生日快乐🎂

有时候在想，
好像从我记事开始，
你就一直在为我操心。

小时候是吃什么、穿什么、有没有受委屈，
长大以后是我过得好不好、累不累、有没有人照顾我。

你总是把我的事情放在第一位，
却很少认真想过自己。

以前觉得这些都是理所当然，
现在才慢慢明白，
原来这些“理所当然”，
都是你一点一点的付出和爱。

其实有很多话，
我平时不太会说出口，
但我真的一直都很依赖你，
也一直都很爱你。

希望新的一岁，
你可以轻松一点，
不用总是为我担心，
多去做让自己开心的事情。

也希望时间可以慢一点，
对你温柔一点，
让我有更多时间陪着你。

以后换我慢慢照顾你，
换我多为你想一点。

妈妈，生日快乐❤️`;

    const captions = [
      "小时候是你牵着我，现在我想慢慢陪着你。",
      "很多我觉得普通的日子，其实都是你在撑着我。",
      "你总说没关系，但其实你帮我挡下了很多事情。",
      "以前你照顾我，以后我也想好好照顾你。",
      "这些照片不只是回忆，是我一直被你爱着的证明。"
    ];

    function playMusic() {
      music.play().then(() => {
        musicBtn.textContent = "🎵 播放中";
      }).catch((err) => {
        musicBtn.textContent = "🎵 点我播放";
        console.log("播放失败：", err);
      });
    }

    function pauseMusic() {
      music.pause();
      musicBtn.textContent = "🎵 点我播放";
    }

    musicBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (music.paused) {
        playMusic();
      } else {
        pauseMusic();
      }
    });

    function launchHearts() {
      setInterval(() => {
        const h = document.createElement("div");
        h.className = "heart";
        h.textContent = Math.random() > 0.5 ? "💗" : "💖";
        h.style.left = Math.random() * 100 + "vw";
        h.style.animationDuration = (5 + Math.random() * 4) + "s";
        h.style.fontSize = (14 + Math.random() * 16) + "px";
        hearts.appendChild(h);
        setTimeout(() => h.remove(), 9000);
      }, 700);
    }
    launchHearts();

    function typeWriter(done) {
      let i = 0;
      const duration = 10000;
      const speed = duration / text.length;

      function typing() {
        if (i < text.length) {
          msg.innerHTML = text.slice(0, i + 1).replace(/\n/g, "<br>") + '<span class="cursor">|</span>';
          i++;
          setTimeout(typing, speed);
        } else {
          msg.innerHTML = text.replace(/\n/g, "<br>");
          done && done();
        }
      }
      typing();
    }

    function showCaption(text) {
      caption.classList.remove("show");
      setTimeout(() => {
        caption.textContent = text;
        caption.classList.add("show");
      }, 200);
    }

    function startMemoryShow() {
      gallery.classList.add("show");
      let index = 0;
      showCaption(captions[0]);

      const interval = setInterval(() => {
        if (index >= slides.length - 1) {
          clearInterval(interval);
          setTimeout(() => {
            endline.classList.add("show");
          }, 1200);
          return;
        }

        slides[index].classList.remove("active");
        index++;
        slides[index].classList.add("active");
        showCaption(captions[index]);
      }, 2800);
    }

    let opened = false;
    function openLetter() {
      if (opened) return;
      opened = true;
      envelope.classList.add("open");

      setTimeout(() => {
        envelopeWrap.classList.add("hide");
      }, 650);

      setTimeout(() => {
        cardWrap.classList.add("show");
        playMusic();
        typeWriter(() => {
          startMemoryShow();
        });
      }, 900);
    }

    envelope.addEventListener("click", openLetter);
  </script>
</body>
</html>
