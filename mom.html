<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>给妈妈的一封回忆信</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
      background:
        radial-gradient(circle at top left, #fff4f7 0%, transparent 35%),
        radial-gradient(circle at top right, #f4f9ff 0%, transparent 35%),
        linear-gradient(135deg,#fff0f4,#f8fbff 55%,#fff7ef);
      overflow-x:hidden;
      color:#2b2b2b;
    }

    .hearts{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:1;
    }
    .heart{
      position:absolute;
      bottom:-40px;
      font-size:18px;
      opacity:.75;
      animation:floatUp linear forwards;
      filter:drop-shadow(0 4px 8px rgba(255,90,120,.15));
    }
    @keyframes floatUp{
      0%{transform:translateY(0) translateX(0) scale(.8);opacity:0}
      10%{opacity:.75}
      100%{transform:translateY(-115vh) translateX(25px) scale(1.2);opacity:0}
    }

    .music-btn{
      position:fixed;
      top:18px;
      right:18px;
      z-index:20;
      border:none;
      border-radius:14px;
      padding:10px 14px;
      background:linear-gradient(135deg,#ff7a95,#ff5d82);
      color:#fff;
      font-size:14px;
      box-shadow:0 10px 24px rgba(255,93,130,.28);
      cursor:pointer;
    }

    .screen{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px 16px 36px;
      position:relative;
      z-index:2;
    }

    .envelope-wrap{
      width:min(420px,92vw);
      text-align:center;
      transition:opacity .7s ease, transform .7s ease;
    }
    .envelope-wrap.hide{
      opacity:0;
      transform:translateY(-16px) scale(.98);
      pointer-events:none;
    }
    .hint{
      margin-top:18px;
      color:#7c6f76;
      font-size:15px;
      letter-spacing:.3px;
    }

    .envelope{
      width:100%;
      aspect-ratio:1.18/0.82;
      position:relative;
      cursor:pointer;
      margin:0 auto;
      filter:drop-shadow(0 20px 40px rgba(0,0,0,.12));
    }
    .env-back{
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,#fff,#fff8fa);
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(0,0,0,.05);
    }
    .env-front{
      position:absolute;
      left:0; right:0; bottom:0;
      height:62%;
      background:linear-gradient(135deg,#ffd8e1,#ffc9d6);
      clip-path:polygon(0 0,50% 58%,100% 0,100% 100%,0 100%);
      border-bottom-left-radius:18px;
      border-bottom-right-radius:18px;
      z-index:3;
    }
    .env-top{
      position:absolute;
      left:0; right:0; top:0;
      height:62%;
      background:linear-gradient(135deg,#ffe4eb,#ffd4df);
      clip-path:polygon(0 0,100% 0,50% 100%);
      transform-origin:top center;
      transition:transform .9s ease;
      z-index:4;
    }
    .envelope.open .env-top{
      transform:rotateX(180deg);
    }
    .letter-preview{
      position:absolute;
      left:7%;
      width:86%;
      top:11%;
      height:72%;
      background:linear-gradient(180deg,#fff,#fff9fb);
      border-radius:14px;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#d95b78;
      font-weight:700;
      font-size:24px;
      transform:translateY(20px);
      transition:transform .9s ease;
      box-shadow:0 8px 20px rgba(0,0,0,.05) inset;
    }
    .envelope.open .letter-preview{
      transform:translateY(-46px);
    }
    .seal{
      position:absolute;
      left:50%;
      top:49%;
      transform:translate(-50%,-50%);
      z-index:5;
      width:62px;
      height:62px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #ff96aa, #ff6283);
      box-shadow:0 8px 20px rgba(255,98,131,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:24px;
      transition:opacity .3s ease;
    }
    .envelope.open .seal{
      opacity:0;
    }

    .card-wrap{
      width:min(780px,94vw);
      opacity:0;
      transform:translateY(30px) scale(.98);
      pointer-events:none;
      transition:opacity .85s ease, transform .85s ease;
    }
    .card-wrap.show{
      opacity:1;
      transform:translateY(0) scale(1);
      pointer-events:auto;
    }

    .card{
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:28px;
      padding:28px 20px 24px;
      box-shadow:0 20px 60px rgba(0,0,0,.12);
      position:relative;
      overflow:hidden;
    }
    .card:before{
      content:"";
      position:absolute;
      inset:-80px auto auto -80px;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(255,174,194,.18);
      filter:blur(10px);
    }
    .card:after{
      content:"";
      position:absolute;
      right:-60px;
      bottom:-60px;
      width:160px;
      height:160px;
      border-radius:50%;
      background:rgba(180,214,255,.16);
      filter:blur(10px);
    }

    .title{
      margin:0 0 8px;
      font-size:30px;
      line-height:1.2;
      position:relative;
      z-index:1;
    }
    .sub{
      color:#8a7c82;
      font-size:14px;
      margin-bottom:16px;
      position:relative;
      z-index:1;
    }

    .msg{
      font-size:18px;
      line-height:2;
      white-space:pre-wrap;
      min-height:220px;
      position:relative;
      z-index:1;
    }

    .cursor{
      display:inline-block;
      width:10px;
      animation:blink 1s infinite;
      color:#ff6f90;
      font-weight:700;
    }
    @keyframes blink{
      0%,50%{opacity:1}
      50.01%,100%{opacity:0}
    }

    .gallery{
      position:relative;
      margin:22px 0 8px;
      height:420px;
      border-radius:22px;
      overflow:hidden;
      z-index:1;
      background:rgba(255,255,255,.45);
      box-shadow:0 14px 30px rgba(0,0,0,.12);
      opacity:0;
      transform:translateY(16px);
      transition:opacity 1.2s ease, transform 1.2s ease;
    }
    .gallery.show{
      opacity:1;
      transform:translateY(0);
    }

    .slide{
      position:absolute;
      inset:0;
      opacity:0;
      transform:scale(1.05);
      transition:opacity 1.4s ease, transform 1.8s ease;
    }
    .slide.active{
      opacity:1;
      transform:scale(1);
      z-index:2;
    }
    .slide img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .caption{
      position:absolute;
      left:16px;
      right:16px;
      bottom:16px;
      z-index:3;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(0,0,0,.28);
      color:#fff;
      font-size:15px;
      line-height:1.6;
      opacity:0;
      transform:translateY(10px);
      transition:all .8s ease;
      backdrop-filter:blur(6px);
    }
    .caption.show{
      opacity:1;
      transform:translateY(0);
    }

    .from{
      margin-top:14px;
      text-align:right;
      font-size:18px;
      font-weight:700;
      color:#4a3f44;
      position:relative;
      z-index:1;
    }

    .endline{
      margin-top:12px;
      text-align:center;
      font-size:26px;
      line-height:1.5;
      color:#d85d7b;
      font-weight:800;
      letter-spacing:.5px;
      opacity:0;
      transform:translateY(12px) scale(.96);
      transition:all .9s ease;
    }
    .endline.show{
      opacity:1;
      transform:translateY(0) scale(1);
    }

    @media (max-width:640px){
      .title{font-size:24px}
      .msg{font-size:17px;min-height:250px}
      .gallery{height:300px}
      .music-btn{top:12px;right:12px;padding:9px 12px}
      .endline{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <button class="music-btn" id="musicBtn">🎵 BGM</button>

  <div class="screen">
    <div class="envelope-wrap" id="envelopeWrap">
      <div class="envelope" id="envelope">
        <div class="env-back"></div>
        <div class="letter-preview">妈妈，生日快乐</div>
        <div class="env-top"></div>
        <div class="env-front"></div>
        <div class="seal">💌</div>
      </div>
      <div class="hint">点一下，打开这封回忆信</div>
    </div>

    <div class="card-wrap" id="cardWrap">
      <div class="card">
        <h1 class="title">To 妈妈：</h1>
<div class="sub" id="dateText" style="display:none;"></div>
        <div id="msg" class="msg"></div>

        <div class="gallery" id="gallery">
          <div class="slide active"><img src="1.jpg" alt="照片1"></div>
          <div class="slide"><img src="2.jpg" alt="照片2"></div>
          <div class="slide"><img src="3.jpg" alt="照片3"></div>
          <div class="slide"><img src="4.jpg" alt="照片4"></div>
          <div class="slide"><img src="5.jpg" alt="照片5"></div>
            <div class="slide"><img src="6.jpg" alt="照片5"></div>
          <div class="caption" id="caption"></div>
        </div>

        <div class="from">—— 永远爱你的我 ❤️</div>
        <div class="endline" id="endline">妈妈，生日快乐🎂3，11。</div>
      </div>
    </div>
  </div>

  <audio id="music" loop>
    <source src="mom.mp3" type="audio/mpeg">
  </audio>

  <script>
    const envelope = document.getElementById("envelope");
    const envelopeWrap = document.getElementById("envelopeWrap");
    const cardWrap = document.getElementById("cardWrap");
    const msg = document.getElementById("msg");
    const music = document.getElementById("music");
    const musicBtn = document.getElementById("musicBtn");
    const hearts = document.getElementById("hearts");
    const dateText = document.getElementById("dateText");
    const gallery = document.getElementById("gallery");
    const slides = document.querySelectorAll(".slide");
    const caption = document.getElementById("caption");
    const endline = document.getElementById("endline");

    const text = `妈妈，生日快乐🎂
亲爱的妈妈：

生日快乐。

写下这封信的时候，我在想你。想你此刻在做什么，想你今天有没有好好吃顿饭，想你有没有也正在想我。

妈妈，我知道你这些年的不容易。你在外面打拼，风里来雨里去，都是为了给我一个更好的未来。小时候我不懂，为什么别人都有妈妈陪，而我没有。后来我懂了，你不是不想陪我，你是不得不离开。你的每一次转身离开，心里都比我还难受吧。

可是妈妈，我想告诉你，我从来没有怪过你。我知道你的爱，一直都在。它藏在每一次电话里的叮咛里，藏在每一份寄回来的礼物里，藏在你拼命工作、省吃俭用、只想让我过得好一点的每一个日夜里。你的爱虽然隔着距离，但我一直都感受得到。

你是那么坚强、那么能干的一个人。在外面闯出了自己的一片天，也为我撑起了一个家。我常常想，要是我长大了也能像你一样厉害就好了。你是我心里最了不起的人，也是我拼命努力的动力。

以后希望你对自己好一点，累了就休息，想吃什么就吃什么，你过得好，我才真的安心。

虽然我们聚少离多，但在我心里，你从来都没有缺席。你是我最亲的人，是我最深的牵挂，也是我永远的骄傲。

妈妈，生日快乐。愿你身体健康，工作顺利。

馨
2026年3月11日

`;

    const captions = [
      "小时候你牵着我走，现在我想慢慢陪着你走。",
      "很多温柔的时刻，回头看，原来都有你的影子。",
      "你总说没关系，可你替我挡下了很多风雨。",
      "以前你照顾我，往后我也想更认真地爱你。",
      "这些回忆都很珍贵，因为照片里一直有你。"
    ];

    const today = new Date();
    dateText.textContent = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;

    function tryPlayMusic() {
      music.play().then(() => {
        musicBtn.textContent = "🎵 BGM中";
      }).catch(() => {
        musicBtn.textContent = "🎵 点我播放";
      });
    }

    musicBtn.addEventListener("click", () => {
      if (music.paused) {
        music.play();
        musicBtn.textContent = "🎵 BGM中";
      } else {
        music.pause();
        musicBtn.textContent = "🎵 BGM";
      }
    });

    window.addEventListener("load", tryPlayMusic);
    document.addEventListener("touchstart", tryPlayMusic, { once:true });
    document.addEventListener("click", tryPlayMusic, { once:true });

    function launchHearts() {
      setInterval(() => {
        const h = document.createElement("div");
        h.className = "heart";
        h.textContent = Math.random() > 0.5 ? "💗" : "💖";
        h.style.left = Math.random() * 100 + "vw";
        h.style.animationDuration = (5 + Math.random() * 4) + "s";
        h.style.fontSize = (14 + Math.random() * 16) + "px";
        hearts.appendChild(h);
        setTimeout(() => h.remove(), 9000);
      }, 650);
    }
    launchHearts();

    function typeWriter(done) {
      let i = 0;
      const duration = 10000;
      const speed = duration / text.length;

      function typing() {
        if (i < text.length) {
          msg.innerHTML = text.slice(0, i + 1).replace(/\n/g, "<br>") + '<span class="cursor">|</span>';
          i++;
          setTimeout(typing, speed);
        } else {
          msg.innerHTML = text.replace(/\n/g, "<br>");
          done && done();
        }
      }
      typing();
    }

    function showCaption(text) {
      caption.classList.remove("show");
      setTimeout(() => {
        caption.textContent = text;
        caption.classList.add("show");
      }, 250);
    }

    function startMemoryShow() {
      gallery.classList.add("show");
      let index = 0;
      showCaption(captions[0]);

      const interval = setInterval(() => {
        if (index >= slides.length - 1) {
          clearInterval(interval);
          setTimeout(() => {
            endline.classList.add("show");
          }, 1200);
          return;
        }

        slides[index].classList.remove("active");
        index++;
        slides[index].classList.add("active");
        showCaption(captions[index]);
      }, 2800);
    }

    let opened = false;
    function openLetter() {
      if (opened) return;
      opened = true;
      envelope.classList.add("open");

      setTimeout(() => {
        envelopeWrap.classList.add("hide");
      }, 650);

      setTimeout(() => {
        cardWrap.classList.add("show");
        tryPlayMusic();
        typeWriter(() => {
          startMemoryShow();
        });
      }, 900);
    }

    envelope.addEventListener("click", openLetter);
  </script>
</body>
</html>
